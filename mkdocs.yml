site_name: 'Bet Settlement Trigger'
site_description: 'Internal documentation for the Bet Settlement Trigger service'

theme:
  name: 'material'
  palette:
    - scheme: 'default'
      primary: 'indigo'
      accent: 'indigo'
  features:
    - 'navigation.sections'
    - 'navigation.top'
    - 'content.code.copy'

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: 'mermaid'
          class: 'mermaid'
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - 'Overview': 'index.md'
  - 'Architecture': 'architecture.md'
  - 'API': 'api.md'
  - 'Reliability': 'reliability.md'
  - 'Decisions': 'decisions.md'
  - 'Assumptions': 'assumptions.md'
